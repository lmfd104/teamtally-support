name: Bug report (iOS)
description: Something in TeamTally on iOS isn't working right
title: "[Bug][iOS] "
labels: ["bug", "ios"]
body:
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Settings/About screen in the app, or the App Store listing
      placeholder: "e.g. 1.2.3"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device & iOS version
      placeholder: "e.g. iPhone 15, iOS 18"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Tap ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Screenshots / extra context
      description: Drag & drop screenshots here if you have them
    validations:
      required: false